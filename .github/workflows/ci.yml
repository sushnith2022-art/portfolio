name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    name: Lint & Test Portfolio Code

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyspark great-expectations pytest flake8

      - name: Lint with flake8
        run: |
          flake8 healthcare-etl-pipeline/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Run tests
        run: |
          pytest healthcare-etl-pipeline/ -v || true
